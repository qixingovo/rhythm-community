<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 字体（按需，系统字体时省略；只能用 Google 字体，CSS 地址前缀：https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google） -->
  <!-- <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet"/> -->

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 - 赛博音游风 === */
      --color-primary:              #00f0ff;
      --color-primary-container:    #00f0ff20;
      --color-on-primary:           #0a0a0f;
      /* === 背景 / 表面 === */
      --color-background:                 #0a0a0f;
      --color-surface-container-lowest:   #0d0d14;
      --color-surface:                    #12121a;
      --color-surface-container:          #1a1a2e;
      --color-surface-container-high:     #22223a;
      --color-surface-container-highest:  #2a2a4a;
      /* === 文字 === */
      --color-on-surface:           #e0e0e0;
      --color-on-surface-variant:   #a0a0b0;
      /* === 功能色 === */
      --color-success:  #00ff88;
      --color-error:    #ff4444;
      --color-warning:  #ffcc00;
      /* === 边框 === */
      --color-outline:          #1e1e30;
      --color-outline-variant:  #2a2a4a;
      /* === 圆角 === */
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影 - 霓虹发光 === */
      --shadow-card:   0 2px 8px rgba(0,240,255,0.1);
      --shadow-float:  0 10px 25px rgba(0,240,255,0.15);
      --shadow-dialog: 0 25px 50px rgba(0,240,255,0.2);
      /* === 字体 === */
      --font-sans: system-ui, -apple-system, sans-serif;
    }
    
    /* 赛博装饰元素 */
    .cyber-grid {
      background-image: 
        linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    
    .cyber-glow {
      box-shadow: 0 0 20px rgba(0,240,255,0.3), 0 0 40px rgba(0,240,255,0.1);
    }
    
    .cyber-line {
      background: linear-gradient(90deg, transparent, var(--color-primary), transparent);
      height: 1px;
      opacity: 0.6;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans min-h-screen cyber-grid">

  <!-- 主内容区 -->
  <!-- @main-content:start -->
  <main class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <!-- 赛博装饰元素 - 左上 -->
    <div class="absolute top-10 left-10 w-64 h-64 border border-primary/20 rotate-45 opacity-30"></div>
    <div class="absolute top-20 left-20 w-32 h-32 border border-primary/30 rotate-45 opacity-40"></div>
    
    <!-- 赛博装饰元素 - 右下 -->
    <div class="absolute bottom-10 right-10 w-64 h-64 border border-primary/20 -rotate-45 opacity-30"></div>
    <div class="absolute bottom-20 right-20 w-32 h-32 border border-primary/30 -rotate-45 opacity-40"></div>
    
    <!-- 登录卡片 -->
    <div class="bg-surface rounded-xl shadow-dialog p-8 w-full max-w-md relative z-10 cyber-glow">
      <!-- Logo和标题 -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center gap-2 mb-4">
          <i data-lucide="music" class="text-primary w-8 h-8"></i>
          <span class="font-bold text-2xl text-primary">Rhythm Community</span>
        </div>
        <h1 class="text-2xl font-bold text-on-surface mb-2">欢迎回来</h1>
        <p class="text-sm text-on-surface-variant">登录你的音游社区账号</p>
      </div>
      
      <!-- 装饰线 -->
      <div class="cyber-line mb-8"></div>
      
      <!-- 登录表单 -->
      <form id="login-form" class="space-y-6">
        <!-- 账号输入 -->
        <div class="space-y-2">
          <label for="input-account" class="text-sm font-medium text-on-surface">手机号 / 邮箱</label>
          <input 
            type="text" 
            id="input-account" 
            class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors"
            placeholder="请输入手机号或邮箱"
          />
        </div>
        
        <!-- 密码输入 -->
        <div class="space-y-2">
          <div class="flex items-center justify-between">
            <label for="input-password" class="text-sm font-medium text-on-surface">密码</label>
            <a href="#" id="link-forgot-password" class="text-xs text-primary hover:underline">忘记密码？</a>
          </div>
          <input 
            type="password" 
            id="input-password" 
            class="w-full bg-surface-container border-none rounded-md px-3 py-2 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors"
            placeholder="请输入密码"
          />
        </div>
        
        <!-- 记住登录 -->
        <div class="flex items-center gap-2">
          <input type="checkbox" id="checkbox-remember" class="w-4 h-4 rounded border-outline-variant bg-surface-container text-primary focus:ring-primary/30" />
          <label for="checkbox-remember" class="text-sm text-on-surface-variant">记住登录状态</label>
        </div>
        
        <!-- 登录按钮 -->
        <button 
          type="submit" 
          id="btn-login"
          class="w-full bg-primary text-on-primary px-4 py-3 rounded-md text-sm font-medium hover:opacity-90 active:scale-[0.98] transition-all inline-flex items-center justify-center gap-2"
        >
          <i data-lucide="log-in" class="w-4 h-4"></i>
          登录
        </button>
      </form>
      
      <!-- 装饰线 -->
      <div class="flex items-center gap-4 my-6">
        <div class="flex-1 h-px bg-outline-variant/30"></div>
        <span class="text-xs text-on-surface-variant">或使用第三方登录</span>
        <div class="flex-1 h-px bg-outline-variant/30"></div>
      </div>
      
      <!-- 第三方登录 -->
      <div class="grid grid-cols-3 gap-3 mb-6">
        <!-- 第三方登录 - QQ -->
        <button 
          id="btn-login-qq"
          class="bg-surface-container hover:bg-surface-container-high transition-colors rounded-md p-3 flex items-center justify-center"
        >
          <i data-lucide="message-circle" class="w-5 h-5 text-on-surface-variant"></i>
        </button>
        
        <!-- 第三方登录 - 微信 -->
        <button 
          id="btn-login-wechat"
          class="bg-surface-container hover:bg-surface-container-high transition-colors rounded-md p-3 flex items-center justify-center"
        >
          <i data-lucide="message-square" class="w-5 h-5 text-on-surface-variant"></i>
        </button>
        
        <!-- 第三方登录 - GitHub -->
        <button 
          id="btn-login-github"
          class="bg-surface-container hover:bg-surface-container-high transition-colors rounded-md p-3 flex items-center justify-center"
        >
          <i data-lucide="github" class="w-5 h-5 text-on-surface-variant"></i>
        </button>
      </div>
      
      <!-- 注册链接 -->
      <div class="text-center">
        <span class="text-sm text-on-surface-variant">还没有账号？</span>
        <a href="register.html" id="link-register" class="text-sm text-primary hover:underline ml-1">立即注册</a>
      </div>
    </div>
  </main>
  <!-- @main-content:end -->

  <script>
    $(function() {
      // 登录表单提交
      $('#login-form').on('submit', function(e) {
        e.preventDefault();
        // 直接跳转到首页，不验证账号密码
        window.location.href = 'home.html';
      });
      
      // 忘记密码链接
      $('#link-forgot-password').on('click', function(e) {
        e.preventDefault();
        console.log('忘记密码功能：需要跳转到密码找回页面');
      });
      
      // 第三方登录 - QQ
      $('#btn-login-qq').on('click', function() {
        console.log('需要调用QQ第三方登录接口');
      });
      
      // 第三方登录 - 微信
      $('#btn-login-wechat').on('click', function() {
        console.log('需要调用微信第三方登录接口');
      });
      
      // 第三方登录 - GitHub
      $('#btn-login-github').on('click', function() {
        console.log('需要调用GitHub第三方登录接口');
      });
      
      lucide.createIcons();
    });
  </script>
</body>

</html>
